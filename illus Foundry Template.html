.bc{position:absolute;transform:translate(-50%,-50%);z-index:2;width:128px;text-align:center;cursor:grab}
.bc.sz-lg{width:150px}.bc.sz-sm{width:100px}
.bc:active{cursor:grabbing}
.bc:not(.done){background:rgba(0,0,0,0.82);border-radius:8px;border:1.5px solid rgba(255,255,255,0.12);padding:7px 8px;backdrop-filter:blur(4px)}

.bc:not(.done).t2{border-color:#06B6D4;box-shadow:0 0 12px rgba(6,182,212,.5)}
.bc:not(.done).t3{border-color:#84CC16;box-shadow:0 0 12px rgba(132,204,22,.5)}
.bc:not(.done).t4{border-color:#F97316;box-shadow:0 0 12px rgba(249,115,22,.5)}
.bc.done{background:none;border:none;padding:2px}

.x-ov{position:absolute;inset:0;pointer-events:none;display:none;z-index:10}
.bc.crossed .x-ov{display:block}
.bc.crossed:not(.done){min-height:72px}
.bc.done.crossed{min-height:65px}
.bc.done.crossed .x-ov{background:rgba(0,0,0,0.45);border-radius:6px;display:block}
.x-ov svg{width:100%;height:100%}

/* inputs */
.bi-name{width:100%;background:rgba(255,255,255,.09);border:none;border-bottom:1px solid rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:700;padding:3px;outline:none;text-align:center;font-family:inherit;border-radius:2px 2px 0 0;cursor:text}
.bi-name::placeholder{color:rgba(255,255,255,.3);font-weight:400;font-size:10px}
.bi-imptag{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(239,68,68,.35);color:#FF3333;font-size:9px;font-weight:700;padding:2px 3px;outline:none;text-align:center;font-family:inherit;margin-bottom:3px;cursor:text;letter-spacing:.03em}
.bi-imptag::placeholder{color:rgba(255,80,80,.4)}
.bi-atk{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(252,211,77,.2);color:#FCD34D;font-size:11px;font-weight:600;padding:2px 3px;outline:none;text-align:center;font-family:inherit;margin-top:3px;cursor:text}
.bi-atk::placeholder{color:rgba(252,211,77,.3);font-size:10px}
.bi-def{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(147,197,253,.2);color:#93C5FD;font-size:11px;font-weight:600;padding:2px 3px;outline:none;text-align:center;font-family:inherit;margin-top:3px;cursor:text}
.bi-def::placeholder{color:rgba(147,197,253,.3);font-size:10px}
/* Notes — white, shows above the X */
.bi-notes{width:100%;background:rgba(255,255,255,.08);border:none;border-bottom:1px solid rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:600;padding:3px;outline:none;text-align:center;font-family:inherit;margin-bottom:3px;cursor:text;border-radius:2px 2px 0 0;position:relative;z-index:15}
.bi-notes::placeholder{color:rgba(255,255,255,.3);font-size:9px}

/* DONE floating text */
.fl-name{font-size:22px;font-weight:800;color:#9CA3AF;text-shadow:0 1px 6px rgba(0,0,0,.99),0 0 14px rgba(0,0,0,.95);line-height:1.3;display:block;letter-spacing:.01em}
.fl-atk{font-size:13px;font-weight:700;color:#FCD34D;text-shadow:0 1px 4px rgba(0,0,0,.95);display:block;line-height:1.3}
.fl-def{font-size:13px;font-weight:700;color:#93C5FD;text-shadow:0 1px 4px rgba(0,0,0,.95);display:block;line-height:1.3}
/* Notes in white — sits above X with higher z-index */
.fl-notes{font-size:13px;font-weight:700;color:#fff;text-shadow:0 1px 5px rgba(0,0,0,.99),0 0 10px rgba(0,0,0,.9);display:block;line-height:1.4;position:relative;z-index:15}
.fl-imptag{font-size:10px;color:#FF3333;font-weight:700;display:block;text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 8px rgba(255,0,0,.3);margin-bottom:2px;letter-spacing:.03em;position:relative;z-index:15}

.bc.t1 .fl-name{color:#FFFFFF;text-shadow:0 1px 6px rgba(0,0,0,.99),0 0 18px rgba(255,255,255,.4)}
.bc.t2 .fl-name{color:#22D3EE;text-shadow:0 1px 6px rgba(0,0,0,.99),0 0 18px rgba(6,182,212,.6)}
.bc.t3 .fl-name{color:#A3E635;text-shadow:0 1px 6px rgba(0,0,0,.99),0 0 18px rgba(132,204,22,.6)}
.bc.t4 .fl-name{color:#FB923C;text-shadow:0 1px 6px rgba(0,0,0,.99),0 0 18px rgba(249,115,22,.6)}

.bctrl{display:flex;justify-content:center;gap:4px;align-items:center;margin-top:4px;position:relative;z-index:15}
.tdot{width:13px;height:13px;border-radius:50%;background:#374151;border:1px solid #4B5563;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:800;color:#9CA3AF;transition:transform .1s;flex-shrink:0}
.tdot:hover{transform:scale(1.2)}
.tdot.t1c{background:#FFFFFF;border-color:#D4D4D8;color:#111827}
.tdot.t2c{background:#22D3EE;border-color:#06B6D4}
.tdot.t3c{background:#A3E635;border-color:#84CC16}
.tdot.t4c{background:#FB923C;border-color:#F97316}
.xbtn{background:none;border:1px solid rgba(255,255,255,.2);border-radius:3px;color:rgba(255,255,255,.4);cursor:pointer;font-size:10px;padding:0 4px;line-height:15px;transition:all .15s}
.xbtn:hover,.bc.crossed .xbtn{border-color:#EF4444;color:#EF4444;background:rgba(239,68,68,.12)}
.done-btn{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.4);border-radius:3px;color:#4ADE80;cursor:pointer;font-size:12px;padding:0 5px;line-height:15px;font-weight:700;transition:all .15s}
.done-btn:hover{background:rgba(34,197,94,.3)}
.edit-btn{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:4px;color:rgba(255,255,255,.6);cursor:pointer;font-size:10px;padding:2px 7px;margin-top:4px;display:inline-block;transition:all .15s}
.edit-btn:hover{border-color:rgba(255,255,255,.5);color:#fff}
.ratio-labels{display:flex;justify-content:space-between;padding:0 2px;margin-top:4px}
.ratio-labels span{font-size:8px;font-weight:700;letter-spacing:.05em}
.atk-label{color:rgba(252,211,77,.6)}
.def-label{color:rgba(147,197,253,.6)}

.ws-team{position:absolute;transform:translate(-50%,-50%);font-size:12px;font-weight:700;color:#A78BFA;text-shadow:0 1px 4px rgba(0,0,0,.95),0 0 10px rgba(0,0,0,.9);text-align:center;line-height:1.4;z-index:3;letter-spacing:.01em;cursor:grab;user-select:none}
.ws-team:active{cursor:grabbing}
.ws-del{display:block;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);border-radius:4px;color:rgba(255,255,255,.55);cursor:pointer;font-size:9px;padding:1px 5px;margin:3px auto 0;transition:all .15s}
.ws-del:hover{border-color:#EF4444;color:#EF4444}
.ws-add-btn{font-size:10px;font-weight:700;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);border-radius:5px;color:#A78BFA;cursor:pointer;padding:3px 8px;white-space:nowrap;transition:filter .15s}
.ws-add-btn:hover{filter:brightness(1.25)}
.ws-panel{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.guide{position:absolute;pointer-events:none;z-index:20;opacity:.85}
.guide.v{top:0;bottom:0;width:1px;background:#22D3EE;transform:translateX(-50%);box-shadow:0 0 4px rgba(34,211,238,.7)}
.guide.h{left:0;right:0;height:1px;background:#22D3EE;transform:translateY(-50%);box-shadow:0 0 4px rgba(34,211,238,.7)}
body.ss .guide{display:none}
body.ss .ws-del{display:none!important}
body.ss .ws-panel{display:none!important}
body.ss .toolbar{display:none}
body.ss .edit-btn{display:none !important}
body.ss .bctrl{display:none}
body.ss .bc.done.crossed .x-ov{background:none}
#ss-btn{display:inline-block;margin-bottom:8px}
body.ss #ss-btn{position:fixed;bottom:16px;right:16px;opacity:.8;z-index:9999;margin:0}

.phase-tabs{display:flex;gap:4px;align-items:center;margin-right:4px}
.phase-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:5px;color:rgba(255,255,255,.4);cursor:pointer;font-size:11px;font-weight:700;padding:4px 12px;transition:all .15s}
.phase-btn.active{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.45);color:#fff}
.phase-btn:hover:not(.active){background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.tbtn-orange{background:rgba(249,115,22,.18);border-color:rgba(249,115,22,.45);color:#FB923C}
.tbtn-orange:hover{background:rgba(249,115,22,.32)}
.pl-label{position:absolute;transform:translate(-50%,-50%);background:rgba(0,0,0,.52);border:2px solid rgba(255,255,255,.5);border-radius:6px;padding:5px 12px;text-align:center;cursor:grab;user-select:none;z-index:4;min-width:90px}
.pl-label:active{cursor:grabbing}
.pl-text{color:#FF3333;font-size:18px;font-weight:800;outline:none;background:transparent;border:none;text-align:center;width:100%;cursor:text;font-family:inherit;resize:none;overflow:hidden;line-height:1.35}
.pl-del{display:block;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);border-radius:4px;color:rgba(255,255,255,.5);cursor:pointer;font-size:9px;padding:1px 5px;margin:3px auto 0;transition:all .15s}
.pl-del:hover{border-color:#EF4444;color:#EF4444}
.pl-add-btn{font-size:10px;font-weight:700;background:rgba(255,51,51,.12);border:1px solid rgba(255,51,51,.35);border-radius:5px;color:#FF6666;cursor:pointer;padding:3px 8px;white-space:nowrap}
.pl-add-btn:hover{background:rgba(255,51,51,.25)}
body.ss .pl-label{background:transparent!important;border-color:transparent!important}
body.ss .pl-del{display:none!important}
body.ss .pl-panel{display:none!important}

/* ── Outer tabs ── */
.outer-tabs{display:flex;gap:0;background:#0D1117;border-bottom:2px solid rgba(255,255,255,.07);padding:0 16px}
.outer-tab{background:transparent;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.38);cursor:pointer;font-size:11px;font-weight:800;padding:11px 18px;transition:all .2s;letter-spacing:.07em;margin-bottom:-2px}
.outer-tab.active{border-bottom-color:#22D3EE;color:#22D3EE}
.outer-tab:hover:not(.active){color:rgba(255,255,255,.65)}

/* ── Plan page ── */
#tab-plan{background:#0F172A;min-height:100vh;width:100%}
.plan-wrap{padding:24px;width:100%;max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
.plan-2col{display:grid;grid-template-columns:1fr 1fr;gap:20px}

/* Plan header */
.plan-header{padding:20px 4px 0}
.plan-hdr-meta-top{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.plan-hdr-title{font-size:clamp(26px, 7vw, 36px);font-weight:900;color:#F1F5F9;letter-spacing:-.02em;margin-bottom:6px}
.plan-hdr-meta-bot{display:flex;align-items:center;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.plan-hdr-divider{border:none;border-top:1px solid rgba(255,255,255,.1);margin:0 0 20px}
.plan-meta-top-inp{background:transparent;border:none;color:#64748B;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;outline:none;font-family:inherit;padding:0;min-width:50px}
.plan-meta-top-inp::placeholder{color:rgba(255,255,255,.14)}
.plan-meta-top-inp:focus{color:#94A3B8}
.plan-meta-bot-inp{background:transparent;border:none;color:#64748B;font-size:13px;outline:none;font-family:inherit;padding:0;min-width:50px}
.plan-meta-bot-inp::placeholder{color:rgba(255,255,255,.12)}
.plan-meta-bot-inp:focus{color:#94A3B8}
.plan-meta-sep{color:#334155;font-size:12px}

/* Section label */
.plan-sec-label{font-size:10px;font-weight:700;letter-spacing:.12em;color:#475569;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.plan-sec-label .plan-add-btn{margin-left:2px}
/* Section-tinted accents (each section gets its own color rhythm) */
.plan-sec-label.acc-phases{color:#22D3EE}
.plan-sec-label.acc-teams{color:#FCD34D}
.plan-sec-label.acc-gathering{color:#F472B6}
.plan-sec-label.acc-subs{color:#FB923C}
.plan-sec-label.acc-formations{color:#C084FC}
.plan-sec-label.acc-instructions{color:#A3E635}

/* Add button */
.plan-add-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:4px;color:rgba(255,255,255,.5);cursor:pointer;font-size:10px;font-weight:700;padding:3px 9px;transition:all .15s;flex-shrink:0}
.plan-add-btn:hover{background:rgba(255,255,255,.14);color:#fff}

/* ── Teams ── */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));gap:1px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.team-card{background:#161D2E;overflow:hidden}
.team-card-hdr{padding:13px 15px 11px}
.team-name-inp{background:transparent;border:none;font-size:14px;font-weight:800;outline:none;width:100%;padding:0;font-family:inherit;letter-spacing:.01em;display:block;margin-bottom:6px}
.team-del-btn{background:rgba(0,0,0,.25);border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:13px;padding:2px 6px;line-height:1;flex-shrink:0;transition:all .15s}
.team-del-btn:hover{background:rgba(0,0,0,.5);color:#EF4444}
.color-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.cp{width:10px;height:10px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;flex-shrink:0}
.cp:hover,.cp.sel{transform:scale(1.35);border-color:rgba(255,255,255,.8)}
/* ── Rally columns ── */
.team-card-body{padding:10px 0 0}
.rallies-grid{display:flex;border-top:1px solid rgba(255,255,255,.06)}
.rally-col{flex:1;min-width:0;border-right:1px solid rgba(255,255,255,.06);padding:10px 12px 12px;display:flex;flex-direction:column;gap:4px}
.rally-col:last-child{border-right:none}
.rally-leader-inp{background:transparent;border:none;border-bottom:1.5px solid rgba(255,255,255,.2);color:#F1F5F9;font-size:12px;font-weight:800;padding:2px 4px;outline:none;width:100%;font-family:inherit;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.rally-leader-inp::placeholder{color:rgba(255,255,255,.2);font-weight:400;text-transform:none}
.rally-leader-inp:focus{border-bottom-color:rgba(255,255,255,.5)}
.rally-joiner-row{display:flex;align-items:center;gap:4px}
.rally-joiner-inp{background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.1);color:#F1F5F9;font-size:12px;padding:2px 3px;outline:none;flex:1;font-family:inherit;min-width:0}
.rally-joiner-inp::placeholder{color:rgba(255,255,255,.2)}
.rally-joiner-inp:focus{border-bottom-color:rgba(255,255,255,.35)}
.rally-footer{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 10px;background:#131929;border-top:1px solid rgba(255,255,255,.05)}
.rally-add-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:4px;color:rgba(255,255,255,.45);cursor:pointer;font-size:10px;font-weight:700;padding:3px 8px;transition:all .15s}
.rally-add-btn:hover{background:rgba(255,255,255,.13);color:#fff}

/* ── Detail mode fields (opt-in per team) ── */
.rally-name-inp{background:rgba(255,255,255,.06);border:none;border-radius:4px;color:#F1F5F9;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:6px 9px;outline:none;width:100%;box-sizing:border-box;font-family:inherit;margin-bottom:8px;text-align:center}
.rally-name-inp::placeholder{color:rgba(255,255,255,.22);font-weight:600}
.rally-name-inp:focus{background:rgba(255,255,255,.12);color:#fff}
.rally-ratio-inp{background:transparent;border:none;border-bottom:1px dashed rgba(255,255,255,.18);color:#94A3B8;font-size:11px;font-style:italic;padding:3px 4px;outline:none;width:100%;box-sizing:border-box;font-family:inherit;margin:2px 0 6px;text-align:center}
.rally-ratio-inp::placeholder{color:rgba(255,255,255,.18)}
.rally-ratio-inp:focus{border-bottom-color:rgba(255,255,255,.4);color:#CBD5E1}
.rally-hero-inp{background:transparent;border:none;border-bottom:1px dashed rgba(255,255,255,.14);color:#94A3B8;font-size:11px;font-style:italic;padding:2px 3px;outline:none;width:70px;flex-shrink:0;font-family:inherit;text-align:right;min-width:0}
.rally-hero-inp::placeholder{color:rgba(255,255,255,.18)}
.rally-hero-inp:focus{border-bottom-color:rgba(255,255,255,.35);color:#CBD5E1}
.detail-toggle-btn{background:rgba(0,0,0,.22);border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:10px;font-weight:700;padding:3px 8px;line-height:1;flex-shrink:0;transition:all .15s;letter-spacing:.04em;white-space:nowrap}
.detail-toggle-btn:hover{background:rgba(0,0,0,.42)}

/* Screenshot mode: hide empty optional fields + the toggle button */
body.plan-ss .rally-name-inp:placeholder-shown,
body.plan-ss .rally-ratio-inp:placeholder-shown,
body.plan-ss .rally-hero-inp:placeholder-shown{display:none!important}
body.plan-ss .detail-toggle-btn{display:none!important}
.team-group-label{font-size:9px;font-weight:700;letter-spacing:.1em;color:#475569;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.team-rows{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.team-row{display:flex;align-items:center;gap:5px}
.team-row-num{font-size:10px;font-weight:600;color:#334155;min-width:14px;text-align:right;flex-shrink:0}
.team-row-inp{background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.15);color:#F1F5F9;font-size:13px;padding:3px 4px;outline:none;flex:1;font-family:inherit;transition:border-color .15s;min-width:0}
.team-row-inp:focus{border-bottom-color:rgba(255,255,255,.4)}
.team-row-inp::placeholder{color:rgba(255,255,255,.25)}
.row-x{background:none;border:none;color:rgba(255,255,255,.12);cursor:pointer;font-size:10px;padding:0 1px;line-height:1;flex-shrink:0}
.row-x:hover{color:#EF4444}

/* ── Formations ── */
.form-card{background:#161D2E;border:1px solid rgba(255,255,255,.06);border-radius:10px;overflow:hidden}
.form-table{width:100%;border-collapse:collapse}
.form-table th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.08em;color:#475569;text-transform:uppercase;background:#0F172A;border-bottom:1px solid rgba(255,255,255,.06)}
.form-table td{padding:9px 14px;font-size:13px;color:#CBD5E1;border-bottom:1px solid rgba(255,255,255,.04)}
.form-table tr:last-child td{border-bottom:none}
.form-table tr:hover td{background:rgba(255,255,255,.03)}
.form-table td[contenteditable=true]{outline:none}
.form-table td[contenteditable=true]:focus{background:rgba(255,255,255,.06);border-radius:3px}
.form-badge{display:inline-block;padding:3px 10px;border-radius:5px;font-size:12px;font-weight:800;letter-spacing:.04em}
.form-row-x{background:none;border:none;color:rgba(255,255,255,.12);cursor:pointer;font-size:12px;padding:0}
.form-row-x:hover{color:#EF4444}
.form-add-row{padding:10px 14px;border-top:1px solid rgba(255,255,255,.05)}

/* ── Subs & Instructions ── */
.plan-list-card{background:#161D2E;border:1px solid rgba(255,255,255,.06);border-radius:10px;overflow:hidden}
.plan-list-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.05);background:#0F172A}
.plan-list-hdr-title{font-size:11px;font-weight:800;color:#94A3B8;letter-spacing:.08em}
.plan-list-body{padding:12px 16px 14px;display:flex;flex-direction:column;gap:6px}
.plan-list-row{display:flex;align-items:center;gap:8px}
.plan-list-num{font-size:11px;font-weight:700;color:#334155;min-width:18px;text-align:right;flex-shrink:0}
.plan-list-bullet{color:#334155;font-size:13px;min-width:10px;flex-shrink:0}
.plan-list-inp{background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.15);color:#F1F5F9;font-size:14px;padding:3px 5px;outline:none;flex:1;font-family:inherit;transition:border-color .15s}
.plan-list-inp:focus{border-bottom-color:rgba(255,255,255,.4)}
.plan-list-inp::placeholder{color:rgba(255,255,255,.25)}
body.plan-ss .plan-title-inp{pointer-events:none}
body.plan-ss .plan-meta-inp{pointer-events:none}
body.plan-ss .plan-stat-inp{pointer-events:none}
body.plan-ss .row-x{display:none!important}
body.plan-ss .team-del-btn{display:none!important}
body.plan-ss #sec-teams.is-empty{display:none!important}
body.plan-ss #sec-gathering.is-empty{display:none!important}
body.plan-ss #sec-subins.is-empty{display:none!important}
body.plan-ss .color-row{display:none!important}
body.plan-ss .plan-add-btn{display:none!important}
body.plan-ss .form-row-x{display:none!important}
body.plan-ss .form-add-row{display:none!important}
body.plan-ss .plan-list-hdr .plan-add-btn{display:none!important}
body.plan-ss #plan-ss-btn{position:fixed;bottom:16px;right:16px;opacity:.8;z-index:9999;margin:0}
bottom:60px;right:16px;background:#111827;color:#fff;padding:9px 14px;border-radius:8px;font-size:12px;font-weight:600;z-index:99999;opacity:1;transition:opacity .6s;max-width:260px;line-height:1.4;pointer-events:none}

.phases-grid{display:grid!important;grid-template-columns:repeat(auto-fit, minmax(260px, 1fr))!important;gap:12px;width:100%}

/* ─── MOBILE / NARROW VIEWPORT (< 900px) ───────────────────────── */
/* NOTE: header rows, teams grid, and phases grid are already auto-responsive */
/* via flex-wrap and grid auto-fit at the base CSS level. This media query   */
/* tightens spacing and stacks the things grid can't naturally handle.       */
@media (max-width: 900px) {
  body { padding: 4px; }
  /* Outer tabs: smaller padding, tighter */
  .outer-tabs { padding: 0 2px; }
  .outer-tab { font-size: 10px; padding: 10px 8px; letter-spacing: .05em; }
  /* Plan tab: tighter padding */
  .plan-wrap { padding: 12px 8px; gap: 14px; }
  /* Tactics tab: tighter padding */
  #tactics-wrap { padding: 12px 8px !important; }
  /* Section labels: allow wrap, slightly smaller buttons */
  .plan-sec-label { flex-wrap: wrap; gap: 6px; }
  .plan-add-btn { padding: 4px 8px; font-size: 10px; }
  /* Rallies inside a team: stack vertically (grid can't help here, it's flex) */
  .rallies-grid { flex-direction: column; }
  .rally-col { border-right: none !important; border-bottom: 1px solid rgba(255,255,255,.06); }
  .rally-col:last-child { border-bottom: none; }
  /* Formations: full-width stack (overrides inline JS width) */
  .formation-card { flex: 1 1 100% !important; width: 100% !important; }
  /* Subs grid: fewer columns */
  .subs-grid { grid-template-columns: repeat(2, 1fr) !important; }
  /* Gathering table: smaller text */
  .gathering-table th, .gathering-table td { font-size: 11px !important; padding: 5px 4px !important; }
  .gathering-cell-inp { font-size: 11px !important; }
  /* Map: building cards scale down a touch on tight screens */
  .bc { transform: translate(-50%,-50%) scale(.85); }
  /* Workshop / phase labels: smaller on tight maps */
  .ws-team { font-size: 10px !important; }
  .pl-label { font-size: 10px !important; padding: 3px 8px !important; }
}

<script>
const BUILDINGS=[
  {id:'boiler',   x:28,y:19,sz:'md',imp:false},
  {id:'repair4',  x:65,y:19,sz:'md',imp:false},
  {id:'mercenary',x:46,y:29,sz:'md',imp:false},
  {id:'proto1',   x:14,y:41,sz:'md',imp:false},
  {id:'repair1',  x:7, y:52,sz:'md',imp:false},
  {id:'imperial', x:46,y:48,sz:'lg',imp:true },
  {id:'repair2',  x:79,y:40,sz:'md',imp:false},
  {id:'proto2',   x:77,y:55,sz:'md',imp:false},
  {id:'munition', x:46,y:61,sz:'md',imp:false},
  {id:'repair3',  x:27,y:74,sz:'md',imp:false},
  {id:'transit',  x:63,y:74,sz:'md',imp:false},
];

function initBuildingState(){
  const s={};
  BUILDINGS.forEach(b=>s[b.id]={player:'',atk:'',def:'',notes:'',imptag:'',crossed:false,team:null,done:false,x:b.x,y:b.y});
  return s;
}
const defWS=()=>[
  {id:'ws1',label:'Workshops\nTeam 1',x:27,y:42,visible:false,color:'#A78BFA'},
  {id:'ws2',label:'Workshops\nTeam 2',x:63,y:41,visible:false,color:'#2DD4BF'},
  {id:'ws3',label:'Workshops\nTeam 3',x:27,y:60,visible:false,color:'#FB7185'},
  {id:'ws4',label:'Workshops\nTeam 4',x:64,y:59,visible:false,color:'#818CF8'},
];
const defPL=(n)=>[];

// EXPORT_ALL_START
const SAVED_DATA=null;
// EXPORT_ALL_END

// ── PLAN factory and initial PLAN must be declared BEFORE if(SAVED_DATA) block
// otherwise PLAN=SAVED_DATA.PLAN throws ReferenceError (TDZ) and halts script init.
const defPLAN=()=>({header:{state:'',alliance:'',date:'',time:''},subs_visible:true,phases_visible:true,gathering_visible:true,teams_visible:true,formations_visible:true,instructions_visible:true,
  phases:[
    {id:'ph1',name:'Phase 1',duration:'',title:'',desc:''},
    {id:'ph2',name:'Phase 2',duration:'',title:'',desc:''},
  ],
  gathering:{title:'Gathering Team',color:'#7C3AED',rows:[
    {id:'gp1',type:'players',cells:[{value:'',span:1},{value:'',span:1},{value:'',span:1},{value:'',span:1}]},
{id:'gp2',type:'players',cells:[{value:'',span:1},{value:'',span:1},{value:'',span:1},{value:'',span:1}]},
  ]},
  teams:[
    {id:'t1',name:'Team 1',color:'#FFFFFF',detail_mode:false,rallies:[{id:'r1a',name:'',ratio:'',leaders:['',''],joiners:['','','',''],hero_hints:['','','','']},{id:'r1b',name:'',ratio:'',leaders:['',''],joiners:['','','',''],hero_hints:['','','','']}]},
    {id:'t2',name:'Team 2',color:'#22D3EE',detail_mode:false,rallies:[{id:'r2a',name:'',ratio:'',leaders:['',''],joiners:['','','',''],hero_hints:['','','','']},{id:'r2b',name:'',ratio:'',leaders:['',''],joiners:['','','',''],hero_hints:['','','','']}]},
    {id:'t3',name:'Team 3',color:'#A3E635',detail_mode:false,rallies:[{id:'r3a',name:'',ratio:'',leaders:['',''],joiners:['','','',''],hero_hints:['','','','']},{id:'r3b',name:'',ratio:'',leaders:['',''],joiners:['','','',''],hero_hints:['','','','']}]},
    {id:'t4',name:'Team 4',color:'#FB923C',detail_mode:false,rallies:[{id:'r4a',name:'',ratio:'',leaders:['',''],joiners:['','','',''],hero_hints:['','','','']},{id:'r4b',name:'',ratio:'',leaders:['',''],joiners:['','','',''],hero_hints:['','','','']}]},
  ],
  formations:[
    {id:'f1',name:'OF1',color:'#FB923C',ratio:'60% Infantry / 1% Lancer / 39% Marksmen',leaders:['','',''],joiners:['','','',''],everyone:'Jessie / Jasser / Seo / Jeronimo / Brad / Gwen'},
    {id:'f2',name:'OF2',color:'#FCD34D',ratio:'40% Infantry / 10% Lancer / 50% Marksmen',leaders:['','',''],joiners:['','','',''],everyone:'Jessie / Jasser / Seo / Jeronimo / Brad / Gwen'},
    {id:'f3',name:'DF', color:'#22D3EE',ratio:'50% Infantry / 10% Lancer / 40% Marksmen',leaders:['','',''],joiners:['','','',''],everyone:'Patrick / Bokan / Gatot'},
  ],
  subs:['','','','','','','',''],
  instructions:['','','','',''],
});

let P1_S=initBuildingState(), P2_S=initBuildingState();
let P1_WS=defWS(), P2_WS=defWS();
let P1_PL=defPL(1), P2_PL=defPL(2);
let activePhase=1;
let PLAN=defPLAN();

if(SAVED_DATA){
  P1_S=SAVED_DATA.P1_S; P2_S=SAVED_DATA.P2_S;
  P1_WS=SAVED_DATA.P1_WS; P2_WS=SAVED_DATA.P2_WS;
  P1_PL=SAVED_DATA.P1_PL; P2_PL=SAVED_DATA.P2_PL;
  activePhase=1;
  if(SAVED_DATA.PLAN)PLAN=SAVED_DATA.PLAN;
}

let S=activePhase===1?P1_S:P2_S;
let WORKSHOPS=activePhase===1?P1_WS:P2_WS;
let PHASE_LABELS=activePhase===1?P1_PL:P2_PL;


const TEAM_COLORS=['#FFFFFF','#22D3EE','#A3E635','#FB923C','#FCD34D','#C084FC','#F472B6','#EF4444'];
// Workshop colors — deliberately outside TEAM_COLORS so workshops never blend with rally teams.
// Index matches workshop order (ws1 → violet, ws2 → teal, ws3 → rose, ws4 → indigo).
const WORKSHOP_COLORS=['#A78BFA','#2DD4BF','#FB7185','#818CF8'];
const PHASE_COLORS=['#374151','#1D4ED8','#B45309','#B91C1C','#065F46'];

function syncPlan(){
  // header
  const hf=id=>document.getElementById(id);
  if(!PLAN.header)PLAN.header={};
  ['state','alliance','legion','date','time'].forEach(k=>{const el=hf('ph-'+k);if(el)PLAN.header[k]=el.value;});
  // teams — only sync if visible (DOM populated)
  if(PLAN.teams_visible){
    PLAN.teams.forEach(team=>{
      const ni=document.getElementById('tn-'+team.id);
      if(ni)team.name=ni.value;
      (team.rallies||[]).forEach(r=>{
        const lis=document.querySelectorAll('.rl-'+team.id+'-'+r.id);
        if(lis.length)r.leaders=Array.from(lis).map(i=>i.value);
        const jis=document.querySelectorAll('.rj-'+team.id+'-'+r.id);
        if(jis.length)r.joiners=Array.from(jis).map(i=>i.value);
        // NEW: rally name, ratio, hero hints (only present when detail_mode is on)
        const nameEl=document.getElementById('rn-'+team.id+'-'+r.id);
        if(nameEl)r.name=nameEl.value;
        const ratioEl=document.getElementById('rr-'+team.id+'-'+r.id);
        if(ratioEl)r.ratio=ratioEl.value;
        const heroEls=document.querySelectorAll('.rh-'+team.id+'-'+r.id);
        if(heroEls.length)r.hero_hints=Array.from(heroEls).map(e=>e.value);
      });
    });
  }
  // formations — only sync if visible
  if(PLAN.formations_visible){
    PLAN.formations.forEach(f=>{
      const ni=document.getElementById('fn-'+f.id);if(ni)f.name=ni.value;
      const ri=document.getElementById('fr-'+f.id);if(ri)f.ratio=ri.value;
      const ei=document.getElementById('fe-'+f.id);if(ei)f.everyone=ei.value;
      const lis=document.querySelectorAll('.fl-'+f.id);if(lis.length)f.leaders=Array.from(lis).map(i=>i.value);
      const jis=document.querySelectorAll('.fj-'+f.id);if(jis.length)f.joiners=Array.from(jis).map(i=>i.value);
    });
  }
  // phases — only sync if visible
  if(PLAN.phases_visible){
    (PLAN.phases||[]).forEach(p=>{
      const n=document.getElementById('pn-'+p.id);const d=document.getElementById('pd-'+p.id);
      const t=document.getElementById('pt-'+p.id);const dd=document.getElementById('pdd-'+p.id);
      if(n)p.name=n.value;if(d)p.duration=d.value;if(t)p.title=t.value;if(dd)p.desc=dd.value;
    });
  }
  // gathering — only sync if visible
  if(PLAN.gathering_visible){
    (PLAN.gathering.rows||[]).forEach(row=>{
      if(row.type==='note'){const el=document.querySelector(`[data-gid="${row.id}"]`);if(el)row.text=el.value;}
      else{
        const cells=row.cells.map(c=>typeof c==='string'?{value:c,span:1}:c);
        cells.forEach((c,i)=>{const el=document.querySelector(`[data-gid="${row.id}"][data-ci="${i}"]`);if(el)c.value=el.value;});

    });

  // subs — only sync if visible
  if(PLAN.subs_visible){
    const vals=Array.from(document.querySelectorAll('.sub-inp')).map(i=>i.value);

  // instructions — only sync if visible
  if(PLAN.instructions_visible){
    const insEls=document.querySelectorAll('.ins-inp');
    if(insEls.length)PLAN.instructions=Array.from(insEls).map(el=>el.innerHTML!==undefined?el.innerHTML:el.value);
  }

function renderGathering(){
  let sec=document.getElementById('sec-gathering');
  if(!sec){
    const wrap=document.getElementById('plan-wrap');
    sec=document.createElement('div');sec.id='sec-gathering';
    wrap.appendChild(sec);
  }
  // Gathering ALWAYS has 4 workshop columns — workshops are conceptually separate from rally teams.
  // (Even if Battle Plan has 10 teams, there are only ever 4 workshops on the map.)
  const defaultTeams=[{name:'Team 1',color:'#374151'},{name:'Team 2',color:'#374151'},{name:'Team 3',color:'#374151'},{name:'Team 4',color:'#374151'}];
  const sourceTeams=PLAN.teams.length?PLAN.teams:defaultTeams;
  const teams=[...sourceTeams,...defaultTeams].slice(0,4);
  const nc=4;
  const g=PLAN.gathering;

  const thCells=teams.map((t,i)=>{
    const color=WORKSHOP_COLORS[i%WORKSHOP_COLORS.length];
    return`<th style="background:${color};color:#111827">${esc(t.name)}</th>`;
  }).join('');

  const colDef=`<col style="width:${(100/nc).toFixed(2)}%">`.repeat(nc);

  const rows=(g.rows||[]).map(row=>{
    if(row.type==='note')return''; // legacy, no longer used
    // Normalize cells to span objects, AND cap total span to nc=4 columns.
    // This handles legacy rows from when there were more teams (so more cells).
    let rawCells=(row.cells||Array(nc).fill({value:'',span:1})).map(c=>typeof c==='string'?{value:c,span:1}:c);
    let total=0;
    const cells=[];
    for(const c of rawCells){
      if(total>=nc) break;
      const s=Math.min(c.span||1,nc-total);
      cells.push({value:c.value||'',span:s});
      total+=s;
    }
    while(total<nc){cells.push({value:'',span:1});total++;}
    const isLast=(ci)=>ci===cells.length-1;
    const tds=cells.map((c,ci)=>{
      const span=c.span||1;
      const canSplit=span>1;
      const canMerge=!isLast(ci);
      const mergeBtn=canMerge?`<button class="g-merge-btn" onclick="mergeGatheringCell('${row.id}',${ci})">→</button>`:'';
      const splitBtn=canSplit?`<button class="g-split-btn" onclick="splitGatheringCell('${row.id}',${ci})">↩</button>`:'';
      const delBtn=isLast(ci)?`<button class="gathering-row-del" onclick="removeGatheringRow('${row.id}')">×</button>`:'';
      return`<td colspan="${span}" style="padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.05);border-right:${isLast(ci)?'none':'1px solid rgba(255,255,255,.04)'};background:#1E293B">
        <div style="display:flex;align-items:center;gap:4px">
          <input class="gathering-cell-inp" data-gid="${row.id}" data-ci="${ci}" placeholder="Player" value="${esc(c.value)}" style="flex:1;min-width:0;text-align:center">
          ${mergeBtn}${splitBtn}${delBtn}
        </div>
      </td>`;
    }).join('');
    return`<tr class="gathering-tr-players">${tds}</tr>`;
  }).join('');

  if(!PLAN.gathering_visible){sec.innerHTML='';return;}
  sec.classList.toggle('is-empty',(g.rows||[]).length===0);
  const gShowTeams=!PLAN.teams_visible&&PLAN.gathering_visible?`<button class="plan-add-btn" style="margin-left:4px" onclick="toggleTeams()">+ Show Teams</button>`:'';
  const gShowPhases=!PLAN.phases_visible&&!PLAN.teams_visible&&PLAN.gathering_visible?`<button class="plan-add-btn" style="margin-left:4px" onclick="togglePhases()">+ Show Phases</button>`:'';
  sec.innerHTML=`<div class="plan-sec-label acc-gathering">🏭 GATHERING / WORKSHOPS ${gShowTeams}${gShowPhases}<button class="plan-add-btn" style="margin-left:4px;color:rgba(255,100,100,.7)" onclick="toggleGathering()">× Remove</button></div>
    <div class="gathering-wrap">
      <table class="gathering-table">
        <colgroup>${colDef}</colgroup>
        <tr class="gathering-tr-header">${thCells}</tr>
        ${rows}
      </table>
      <div class="gathering-footer">
        <button class="plan-add-btn" onclick="addGatheringPlayerRow()">+ Player Row</button>
      </div>
    </div>`;
}

function toggleTeams(){syncPlan();PLAN.teams_visible=!PLAN.teams_visible;renderTeams();renderGathering();renderSubsIns();}
function toggleGathering(){syncPlan();PLAN.gathering_visible=!PLAN.gathering_visible;renderGathering();renderSubsIns();}
function addGatheringPlayerRow(){syncPlan();PLAN.gathering.rows.push({id:'gp'+Date.now(),type:'players',cells:Array(4).fill(null).map(()=>({value:'',span:1}))});renderGathering();}

function mergeGatheringCell(rowId,ci){
  syncPlan();
  const row=PLAN.gathering.rows.find(r=>r.id===rowId);
  if(!row||row.type!=='players')return;
  const cells=row.cells.map(c=>typeof c==='string'?{value:c,span:1}:c);
  if(ci>=cells.length-1)return;
  cells[ci]={value:cells[ci].value,span:(cells[ci].span||1)+(cells[ci+1].span||1)};
  cells.splice(ci+1,1);
  row.cells=cells;
  renderGathering();
}
function splitGatheringCell(rowId,ci){
  syncPlan();
  const row=PLAN.gathering.rows.find(r=>r.id===rowId);
  if(!row||row.type!=='players')return;
  const cells=row.cells.map(c=>typeof c==='string'?{value:c,span:1}:c);
  const cell=cells[ci];
  if(!cell||cell.span<=1)return;
  const newCells=[{value:cell.value,span:1},...Array(cell.span-1).fill(null).map(()=>({value:'',span:1}))];
  cells.splice(ci,1,...newCells);
  row.cells=cells;
  renderGathering();
}

function removeGatheringRow(id){syncPlan();PLAN.gathering.rows=PLAN.gathering.rows.filter(r=>r.id!==id);renderGathering();}

// Formation drag-to-reorder
let __formDragId=null;
function formDragStart(e,id){
  __formDragId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
  const card=document.querySelector('.formation-card[data-fid="'+id+'"]');
  if(card)card.classList.add('dragging');
}
function formDragEnd(e){
  document.querySelectorAll('.formation-card').forEach(c=>{c.classList.remove('dragging');c.classList.remove('drop-target');});
  __formDragId=null;
}
function formDragOver(e){
  if(!__formDragId)return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const card=e.currentTarget;
  document.querySelectorAll('.formation-card').forEach(c=>c.classList.toggle('drop-target',c===card&&c.getAttribute('data-fid')!==__formDragId));
}
function formDrop(e){
  if(!__formDragId)return;
  e.preventDefault();
  const targetCard=e.currentTarget;
  const targetId=targetCard.getAttribute('data-fid');
  if(targetId===__formDragId){formDragEnd(e);return;}
  syncPlan();
  const fromIdx=PLAN.formations.findIndex(f=>f.id===__formDragId);
  const toIdx=PLAN.formations.findIndex(f=>f.id===targetId);
  if(fromIdx<0||toIdx<0){formDragEnd(e);return;}
  const [moved]=PLAN.formations.splice(fromIdx,1);
  PLAN.formations.splice(toIdx,0,moved);
  __formDragId=null;
  renderFormations();
}

function fmtRed(){
  const sel=window.getSelection();
  if(!sel.rangeCount||sel.isCollapsed)return;
  const node=sel.getRangeAt(0).commonAncestorContainer;
  const el=node.nodeType===3?node.parentElement:node;
  const color=window.getComputedStyle(el).color;
  const isRed=color==='rgb(239, 68, 68)';
  document.execCommand('foreColor',false,isRed?'#F1F5F9':'#EF4444');
}
function fmtBig(){
  const sel=window.getSelection();
  if(!sel.rangeCount||sel.isCollapsed)return;
  const range=sel.getRangeAt(0);
  const node=range.commonAncestorContainer;
  const el=node.nodeType===3?node.parentElement:node;
  const bigSpan=el.tagName==='SPAN'&&el.dataset.fmt==='big'?el:(el.closest?el.closest('span[data-fmt="big"]'):null);
  if(bigSpan){
    const frag=document.createDocumentFragment();
    while(bigSpan.firstChild)frag.appendChild(bigSpan.firstChild);
    bigSpan.parentNode.replaceChild(frag,bigSpan);
  }else{
    try{
      const span=document.createElement('span');
      span.setAttribute('data-fmt','big');
      span.style.cssText='font-size:15px';
      range.surroundContents(span);
    }catch(e){document.execCommand('bold');}
  }
}

const TEAM_ORDER=[null,'t1','t2','t3','t4'];
const TDOT={t1:'t1c',t2:'t2c',t3:'t3c',t4:'t4c'};
const TLBL={t1:'T1',t2:'T2',t3:'T3',t4:'T4'};

let dragId=null,dragType=null,ox=0,oy=0;

function startDrag(e,id,type){
  if(['INPUT','BUTTON','TEXTAREA'].includes(e.target.tagName))return;
  dragId=id; dragType=type||'building';
  const mr=document.getElementById('map-wrap').getBoundingClientRect();
  const s=type==='workshop'?WORKSHOPS.find(w=>w.id===id):type==='phaselabel'?PHASE_LABELS.find(p=>p.id===id):S[id];
  ox=e.clientX-(s.x/100*mr.width+mr.left);
  oy=e.clientY-(s.y/100*mr.height+mr.top);
  e.preventDefault();
}
const SNAP_THRESH=1.2;
function allPositions(exId,exType){
  const pts=[];
  if(exType==='building'){
    BUILDINGS.forEach(b=>{
      if(b.id===exId)return;
      pts.push({x:S[b.id].x,y:S[b.id].y});
    });
  } else {
    WORKSHOPS.filter(w=>w.visible&&w.id!==exId).forEach(w=>{
      pts.push({x:w.x,y:w.y});
    });
  }
  return pts;
}
function showGuides(x,y,exId,exType){
  clearGuides();
  const wrap=document.getElementById('map-wrap');
  allPositions(exId,exType).forEach(p=>{
    if(Math.abs(p.x-x)<SNAP_THRESH){const g=document.createElement('div');g.className='guide v';g.style.left=p.x+'%';wrap.appendChild(g);}
    if(Math.abs(p.y-y)<SNAP_THRESH){const g=document.createElement('div');g.className='guide h';g.style.top=p.y+'%';wrap.appendChild(g);}
  });
}
function clearGuides(){document.querySelectorAll('.guide').forEach(g=>g.remove());}

document.addEventListener('mousemove',e=>{
  if(!dragId)return;
  const mr=document.getElementById('map-wrap').getBoundingClientRect();
  let nx=Math.max(3,Math.min(97,(e.clientX-ox-mr.left)/mr.width*100));
  let ny=Math.max(3,Math.min(97,(e.clientY-oy-mr.top)/mr.height*100));
  // Snap to aligned elements
  const pts=allPositions(dragId,dragType);
  pts.forEach(p=>{
    if(Math.abs(p.x-nx)<SNAP_THRESH)nx=p.x;
    if(Math.abs(p.y-ny)<SNAP_THRESH)ny=p.y;
  });
  if(dragType==='workshop'){
    const w=WORKSHOPS.find(ws=>ws.id===dragId);
    if(w){w.x=nx;w.y=ny;}
    const el=document.getElementById('ws-'+dragId);
    if(el){el.style.left=nx+'%';el.style.top=ny+'%';}
    showGuides(nx,ny,dragId,'workshop');
  } else if(dragType==='phaselabel'){
    const pl=PHASE_LABELS.find(p=>p.id===dragId);
    if(pl){pl.x=nx;pl.y=ny;}
    const el=document.getElementById('pl-'+dragId);
    if(el){el.style.left=nx+'%';el.style.top=ny+'%';}
    clearGuides();
  } else {
    S[dragId].x=nx;S[dragId].y=ny;
    const el=document.getElementById('card-'+dragId);
    if(el){el.style.left=nx+'%';el.style.top=ny+'%';}
    showGuides(nx,ny,dragId,'building');
  }
});
document.addEventListener('mouseup',()=>{dragId=null;dragType=null;clearGuides();});

function save(){
  BUILDINGS.forEach(b=>{
    const p=document.getElementById('p-'+b.id);
    const a=document.getElementById('a-'+b.id);

function esc(s){return String(s).replace(/"/g,'&quot;');}

function card(b){
  const s=S[b.id];
  const tc=s.team?' '+s.team:'';
  const xc=s.crossed?' crossed':'';
  const xOv=`<div class="x-ov"><svg viewBox="0 0 100 100" preserveAspectRatio="none">
    <line x1="5" y1="5" x2="95" y2="95" stroke="#EF4444" stroke-width="13" stroke-linecap="round" opacity=".95"/>
    <line x1="95" y1="5" x2="5" y2="95" stroke="#EF4444" stroke-width="13" stroke-linecap="round" opacity=".95"/>
  </svg></div>`;
  const pos=`left:${s.x}%;top:${s.y}%`;

  // ── DONE STATE ────────────────────────────────────────
  if(s.done){
    if(s.crossed){
      // X'd out — only show note above X, everything else hidden
      const notesTxt=s.notes
        ?`<span class="fl-notes">${esc(s.notes)}</span>`
        :`<span class="fl-notes" style="opacity:.4">—</span>`;
      return `<div id="card-${b.id}" class="bc sz-${b.sz} done${tc} crossed" style="${pos}" onmousedown="startDrag(event,'${b.id}','building')">
        ${notesTxt}
        ${xOv}
        <button class="edit-btn" onclick="expand('${b.id}')">&#9998; Edit</button>
      </div>`;
    }
    // Normal done — show everything
    const imptagTxt=b.imp&&s.imptag?`<span class="fl-imptag">${esc(s.imptag)}</span>`:'';
    const atkTxt=s.atk?`<span class="fl-atk">ATK: ${esc(s.atk)}</span>`:'';
    const defTxt=s.def?`<span class="fl-def">DEF: ${esc(s.def)}</span>`:'';
    return `<div id="card-${b.id}" class="bc sz-${b.sz} done${tc}" style="${pos}" onmousedown="startDrag(event,'${b.id}','building')">
      ${imptagTxt}
      <span class="fl-name">${s.player||'—'}</span>
      ${atkTxt}${defTxt}
      <button class="edit-btn" onclick="expand('${b.id}')">&#9998; Edit</button>
    </div>`;
  }

  // ── EDIT STATE ────────────────────────────────────────
  const dc=s.team?TDOT[s.team]:'';
  const dl=s.team?TLBL[s.team]:'';
  const ctrl=`<div class="bctrl">
    <div class="tdot ${dc}" onclick="cycleTeam('${b.id}')">${dl}</div>
    <button class="xbtn" onclick="toggleX('${b.id}')">&#10005;</button>
    <button class="done-btn" onclick="collapse('${b.id}')">&#10003;</button>
  </div>`;

  if(s.crossed){
    // X'd in edit — notes input + X overlay + just X/done buttons (no team dot)
    const ctrlX=`<div class="bctrl">
      <button class="xbtn" onclick="toggleX('${b.id}')">&#10005;</button>
      <button class="done-btn" onclick="collapse('${b.id}')">&#10003;</button>
    </div>`;
    return `<div id="card-${b.id}" class="bc sz-${b.sz}${tc} crossed" style="${pos}" onmousedown="startDrag(event,'${b.id}','building')">
      ${xOv}
      <input class="bi-notes" id="n-${b.id}" value="${esc(s.notes)}" placeholder="Add note...">
      ${ctrlX}
    </div>`;
  }

  // Normal edit — show all fields
  const imptagField=b.imp
    ?`<input class="bi-imptag" id="it-${b.id}" value="${esc(s.imptag)}" placeholder="FC10 / T11s ONLY">`
    :'';
  const ratioRows=`<div class="ratio-labels"><span class="atk-label">ATK</span><span class="def-label">DEF</span></div>
    <input class="bi-atk" id="a-${b.id}" value="${esc(s.atk)}" placeholder="e.g. 60/1/39">
    <input class="bi-def" id="d-${b.id}" value="${esc(s.def)}" placeholder="e.g. 50/10/40">`;

  return `<div id="card-${b.id}" class="bc sz-${b.sz}${tc}" style="${pos}" onmousedown="startDrag(event,'${b.id}','building')">
    ${xOv}${imptagField}
    <input class="bi-name" id="p-${b.id}" value="${esc(s.player)}" placeholder="Player name">
    ${ratioRows}${ctrl}
  </div>`;
}

function renderWorkshops(){
  document.querySelectorAll('.ws-team').forEach(el=>el.remove());
  // Lazy-migrate older saves that lack the color field
  WORKSHOPS.forEach((w,wsIdx)=>{if(!w.color)w.color=WORKSHOP_COLORS[wsIdx%WORKSHOP_COLORS.length];});
  WORKSHOPS.filter(w=>w.visible).forEach((w,idx)=>{
    const wsIdx=WORKSHOPS.indexOf(w);
    const color=w.color||WORKSHOP_COLORS[wsIdx%WORKSHOP_COLORS.length]; // back-compat for old saves
    const div=document.createElement('div');
    div.id='ws-'+w.id;
    div.className='ws-team';
    div.style.left=w.x+'%';
    div.style.top=w.y+'%';
    div.style.color=color;
    div.innerHTML=w.label.replace('\n','<br>')+
      `<button class="ws-del edit-only" onclick="deleteWS('${w.id}')">&#x2715; Remove</button>`;
    div.addEventListener('mousedown',e=>startDrag(e,w.id,'workshop'));
    document.getElementById('map-wrap').appendChild(div);
  });
  updateWSPanel();
}

function deleteWS(id){
  const w=WORKSHOPS.find(ws=>ws.id===id);
  if(w){w.visible=false;const el=document.getElementById('ws-'+id);if(el)el.remove();updateWSPanel();}
}

function addWS(id){
  const w=WORKSHOPS.find(ws=>ws.id===id);
  if(w){w.visible=true;renderWorkshops();}
}

function updateWSPanel(){
  const panel=document.getElementById('ws-panel');
  if(!panel)return;
  const hidden=WORKSHOPS.filter(w=>!w.visible);
  panel.innerHTML=hidden.length
    ?hidden.map(w=>{
        const wsIdx=WORKSHOPS.indexOf(w);
        const color=w.color||WORKSHOP_COLORS[wsIdx%WORKSHOP_COLORS.length];
        return`<button class="ws-add-btn" style="color:${color};background:${hexRgba(color,.15)};border-color:${hexRgba(color,.4)}" onclick="addWS('${w.id}')">+ ${w.label.replace('\n',' ')}</button>`;
      }).join('')
    :'';
}


function renderPhaseLabels(){
  document.querySelectorAll('.pl-label').forEach(el=>el.remove());
  PHASE_LABELS.filter(pl=>pl.visible).forEach(pl=>{
    const div=document.createElement('div');
    div.id='pl-'+pl.id;
    div.className='pl-label';
    div.style.left=pl.x+'%';
    div.style.top=pl.y+'%';
    div.innerHTML=`<textarea class="pl-text" rows="2" spellcheck="false" oninput="syncPL('${pl.id}',this.value)">${pl.text}</textarea>`+
      `<button class="pl-del edit-only" onclick="deletePL('${pl.id}')">&#x2715; Remove</button>`;
    div.addEventListener('mousedown',e=>startDrag(e,pl.id,'phaselabel'));
    document.getElementById('map-wrap').appendChild(div);
  });
  updatePLPanel();
}
function syncPL(id,val){const pl=PHASE_LABELS.find(p=>p.id===id);if(pl)pl.text=val;}
function deletePL(id){
  const idx=PHASE_LABELS.findIndex(p=>p.id===id);
  if(idx!==-1){PHASE_LABELS.splice(idx,1);const el=document.getElementById('pl-'+id);if(el)el.remove();updatePLPanel();}
}
function addNewPL(){
  const nid='pl'+Date.now();
  PHASE_LABELS.push({id:nid,text:'Phase '+activePhase,x:50,y:50,visible:true});
  renderPhaseLabels();
}
function updatePLPanel(){
  const panel=document.getElementById('pl-panel');
  if(!panel)return;
  panel.innerHTML='<button class="pl-add-btn" onclick="addNewPL()">+ Add Label</button>';
}

function switchPhase(p){
  try{save();}catch(e){}
  activePhase=p;
  S=(p===1)?P1_S:P2_S;
  WORKSHOPS=(p===1)?P1_WS:P2_WS;
  PHASE_LABELS=(p===1)?P1_PL:P2_PL;
  render();renderWorkshops();renderPhaseLabels();
  updateWSPanel();updatePLPanel();
  document.querySelectorAll('.phase-btn').forEach((btn,i)=>btn.classList.toggle('active',i+1===p));
  document.getElementById('ptab1')&&document.getElementById('ptab1').classList.toggle('active',p===1);
  document.getElementById('ptab2')&&document.getElementById('ptab2').classList.toggle('active',p===2);
}

function copyToPhase(){
  save();
  P2_S=JSON.parse(JSON.stringify(P1_S));
  P2_WS=JSON.parse(JSON.stringify(P1_WS));
  P2_PL=JSON.parse(JSON.stringify(P1_PL));
  P2_PL.forEach(pl=>{pl.text=pl.text.replace(/Phase 1/g,'Phase 2');});
  switchPhase(2);
  showToast('Phase 1 copied to Phase 2!');
}

function render(){document.getElementById('map').innerHTML=BUILDINGS.map(card).join('');}

function toggleSS(){
  const on=document.body.classList.toggle('ss');
  document.getElementById('ss-btn').textContent=on?'Back to Edit Mode':'Hide Controls for Screenshot';
}

function exportMap(){
  save();
  let html=document.documentElement.outerHTML;
  syncPlan();
  const data={
    activePhase,
    P1_S:JSON.parse(JSON.stringify(P1_S)),
    P2_S:JSON.parse(JSON.stringify(P2_S)),
    P1_WS:JSON.parse(JSON.stringify(P1_WS)),
    P2_WS:JSON.parse(JSON.stringify(P2_WS)),
    P1_PL:JSON.parse(JSON.stringify(P1_PL)),
    P2_PL:JSON.parse(JSON.stringify(P2_PL)),
    PLAN:JSON.parse(JSON.stringify(PLAN)),
  };
  const newBlock='// EXPORT_ALL_START\nconst SAVED_DATA='+JSON.stringify(data)+';\n// EXPORT_ALL_END';
  const si=html.indexOf('// EXPORT_ALL_START');
  const ei=html.indexOf('// EXPORT_ALL_END')+('// EXPORT_ALL_END').length;
  html=html.substring(0,si)+newBlock+html.substring(ei);
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='foundry_map_filled.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Map exported! Share in Discord.');
}

function showToast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),600);},3000);
}

switchPhase(activePhase);
renderPlan();
</script>
</body>
</html>
